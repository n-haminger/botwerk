name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: >-
          pytest --tb=short -q
          --ignore=tests/cli/test_factory.py
          --ignore=tests/integration/test_cli_parameter_flow.py
          --ignore=tests/test_config_reload.py
          --deselect tests/cli/test_auth.py::test_check_gemini_auth_botwerk_config_key
          --deselect tests/multiagent/test_supervisor.py::TestStopAll::test_cancellation_unblocks_start

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[lint]"
      - name: Ruff format check
        run: ruff format --check .
      - name: Ruff lint
        run: ruff check .
